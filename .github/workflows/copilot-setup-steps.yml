name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/stockripper/**"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/copilot-setup-steps.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "src/stockripper/**"
      - "tests/**"

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Sync Python dependencies when the project exists
        if: ${{ hashFiles('pyproject.toml') != '' }}
        run: uv sync --dev

      - name: Verify Python and uv toolchain
        run: |
          uv --version
          python --version
          uv run python --version
          if [ -f pyproject.toml ]; then
            uv run pytest --version
            uv run ruff --version
          fi
