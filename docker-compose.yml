services:
  postgres:
    image: postgres:16-alpine
    container_name: stockripper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockripper
      POSTGRES_PASSWORD: stockripper
      POSTGRES_DB: stockripper
    ports:
      - "5432:5432"
    volumes:
      - stockripper-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockripper -d stockripper"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stockripper-pg:
